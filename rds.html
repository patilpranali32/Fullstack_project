<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Managed Database - Cloud Console UI </title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="rds.css">
</head>
<body>

<!-- Auth protection -->
<script src="auth.js"></script>
<script>
  requireAuth();
</script>

<div class="topnav">
    <div class="logo">Cloud Console <span class="demo-badge"></span></div>
    <input type="text" placeholder="Search services...">

    <div class="region-selector">
        <select>
            <option value="us-east-1">US East (N. Virginia)</option>
            <option value="us-west-2">US West (Oregon)</option>
            <option value="eu-west-1">EU (Ireland)</option>
            <option value="ap-south-1">Asia Pacific (Mumbai)</option>
        </select>
    </div>

    <div class="profile" id="profileName">User</div>
    <div class="profile" onclick="logout()">Logout</div>
</div>



<div class="sidebar">
    <h3>Home</h3>
    <a href="dashboard.html">Dashboard</a>

    <h3>Compute</h3>
    <a href="ec2.html">Compute (VMs)</a>
    <a href="lambda.html">Functions</a>

    <h3>Storage</h3>
    <a href="s3.html">Object Storage</a>

    <h3>Database</h3>
    <a href="rds.html" class="active">Managed DB</a>

    <h3>Management</h3>
    <a href="iam.html">Access Control</a>
    <a href="cloudwatch.html">Monitoring</a>
</div>

<div class="main">
    <h1>Managed Databases</h1>

    <div class="actions-bar">
        <button onclick="showDbModal()" class="btn-primary">Create Database</button>
        <button onclick="refreshDatabases()" class="btn-secondary">Refresh</button>
    </div>

    <div class="stats-cards">
        <div class="stat-card">
            <h4>Available</h4>
            <p class="stat-number" id="availableCount">0</p>
        </div>
        <div class="stat-card">
            <h4>Stopped</h4>
            <p class="stat-number" id="stoppedCount">0</p>
        </div>
        <div class="stat-card">
            <h4>Total DBs</h4>
            <p class="stat-number" id="totalCount">0</p>
        </div>
    </div>

    <ul id="dbList" class="db-list"></ul>
</div>

<!-- Create Database Modal -->
<div id="dbModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create Database </h2>
            <span class="close" onclick="closeDbModal()">&times;</span>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label>DB Identifier</label>
                <input type="text" id="dbName" placeholder="e.g., app-db-demo">
            </div>

            <div class="form-group">
                <label>Engine</label>
                <select id="dbEngine">
                    <option value="mysql">MySQL</option>
                    <option value="postgres">PostgreSQL</option>
                    <option value="mariadb">MariaDB</option>
                    <option value="sqlserver">SQL Server</option>
                    <option value="oracle">Oracle</option>
                </select>
            </div>

            <div class="form-group">
                <label>Engine Version</label>
                <select id="dbVersion">
                    <option value="8.0">MySQL 8.0</option>
                    <option value="5.7">MySQL 5.7</option>
                    <option value="14">PostgreSQL 14</option>
                    <option value="13">PostgreSQL 13</option>
                    <option value="10.6">MariaDB 10.6</option>
                </select>
            </div>

            <div class="form-group">
                <label>DB Instance Class</label>
                <select id="dbInstance">
                    <option value="db.t3.micro">db.t3.micro (2 vCPU, 1 GiB)</option>
                    <option value="db.t3.small">db.t3.small (2 vCPU, 2 GiB)</option>
                    <option value="db.t3.medium">db.t3.medium (2 vCPU, 4 GiB)</option>
                    <option value="db.r5.large">db.r5.large (2 vCPU, 16 GiB)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Allocated Storage (GB)</label>
                <input type="number" id="dbStorage" value="20" min="20" max="1000">
            </div>

            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" id="dbMultiAZ"> Multi-zone deployment (Demo)
                </label>
            </div>

            <div class="form-group">
                <label>Region</label>
                <select id="dbRegion">
                    <option value="us-east-1">US East (N. Virginia)</option>
                    <option value="us-west-2">US West (Oregon)</option>
                    <option value="eu-west-1">EU (Ireland)</option>
                    <option value="ap-south-1">Asia Pacific (Mumbai)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Master Username</label>
                <input type="text" id="dbUsername" value="admin">
            </div>

            <div class="form-group">
                <label>Master Password</label>
                <input type="password" id="dbPassword" placeholder="Enter password (demo)">
            </div>
        </div>

        <div class="modal-footer">
            <button onclick="closeDbModal()" class="btn-secondary">Cancel</button>
            <button onclick="addDatabase(); refreshDatabases(); closeDbModal();" class="btn-primary">Create</button>
        </div>
    </div>
</div>

<script src="rds.js"></script>
<script>
    // profile name
    const name = localStorage.getItem("loggedInUserName") || "User";
    document.getElementById("profileName").textContent = name;

    function refreshDatabases() {
        loadDatabases();
        updateStats();
    }

    function updateStats() {
        const available = rdsDatabases.filter(db => db.status === 'Available').length;
        const stopped = rdsDatabases.filter(db => db.status === 'Stopped').length;
        document.getElementById('availableCount').textContent = available;
        document.getElementById('stoppedCount').textContent = stopped;
        document.getElementById('totalCount').textContent = rdsDatabases.length;
    }

    loadDatabases();
    updateStats();
</script>

</body>
</html>
