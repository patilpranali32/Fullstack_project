<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Console  - Sign In</title>
  <meta name="description" content="Educational UI clone for learning purposes only. Not affiliated with any cloud provider." />
  <link rel="stylesheet" href="index.css" />
</head>

<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <div class="brand-logo">
       
      </div>

      <h1>Sign in</h1>

    </div>

    <div class="login-box">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter email" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />
      </div>

      <p id="error" class="error-message"></p>

      <button type="button" onclick="login()" class="btn-login">Sign In</button>

      
    </div>

    <p class="signup-text">
      Don't have an account?
      <a href="register.html">Create account</a>
    </p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
