<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Console - Create Account</title>
  <meta name="description" content="Educational demo account creation for a UI clone project." />
  <link rel="stylesheet" href="index.css" />
  <link rel="stylesheet" href="register.css" />
</head>

<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      
      <h1>Create Demo Account</h1>

      
    </div>

    <div class="login-box">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" />
      </div>

      <p id="error" class="error-message"></p>

      <button type="button" onclick="register()" class="btn-login">Create Account</button>
    </div>

    <p class="signup-text">
      Already have an account?
      <a href="index.html">Sign in</a>
    </p>

    
  </div>

  <script src="auth.js"></script>
</body>
</html>
