<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Functions - Cloud Console UI </title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="lambda.css">
</head>
<body>

<!-- Auth protection -->
<script src="auth.js"></script>
<script>
  requireAuth();
</script>

<div class="topnav">
    <div class="logo">Cloud Console <span class="demo-badge">DEMO</span></div>
    <input type="text" placeholder="Search services...">
    <div class="region-selector">
        <select>
            <option value="us-east-1">US East (N. Virginia)</option>
            <option value="us-west-2">US West (Oregon)</option>
            <option value="eu-west-1">EU (Ireland)</option>
            <option value="ap-south-1">Asia Pacific (Mumbai)</option>
        </select>
    </div>
    <div class="profile" id="profileName">User</div>
    <div class="profile" onclick="logout()">Logout</div>
</div>



<div class="sidebar">
    <h3>Home</h3>
    <a href="dashboard.html">Dashboard</a>

    <h3>Compute</h3>
    <a href="ec2.html">Compute (VMs)</a>
    <a href="lambda.html" class="active">Functions</a>

    <h3>Storage</h3>
    <a href="s3.html">Object Storage</a>

    <h3>Database</h3>
    <a href="rds.html">Managed DB</a>

    <h3>Management</h3>
    <a href="iam.html">Access Control</a>
    <a href="cloudwatch.html">Monitoring</a>
</div>

<div class="main">
    <h1>Serverless Functions (Demo)</h1>

    <div class="actions-bar">
        <button onclick="showLambdaModal()" class="btn-primary">Create Function</button>
        <button onclick="refreshFunctions()" class="btn-secondary">Refresh</button>
    </div>

    <div class="stats-cards">
        <div class="stat-card">
            <h4>Total Functions</h4>
            <p class="stat-number" id="functionCount">0</p>
        </div>
        <div class="stat-card">
            <h4>Invocations Today </h4>
            <p class="stat-number" id="invocationCount">0</p>
        </div>
    </div>

    <ul id="lambdaList" class="lambda-list"></ul>
</div>

<!-- Create Function Modal -->
<div id="lambdaModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Create Function (Demo)</h2>
            <span class="close" onclick="closeLambdaModal()">&times;</span>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label>Function Name</label>
                <input type="text" id="funcName" placeholder="e.g., resize-image-demo">
            </div>

            <div class="form-group">
                <label>Runtime</label>
                <select id="funcRuntime">
                    <option value="nodejs18">Node.js 18</option>
                    <option value="nodejs16">Node.js 16</option>
                    <option value="python3.10">Python 3.10</option>
                    <option value="python3.9">Python 3.9</option>
                    <option value="java11">Java 11</option>
                    <option value="go1.x">Go 1.x</option>
                    <option value="dotnet6">.NET 6</option>
                </select>
            </div>

            <div class="form-group">
                <label>Memory (MB)</label>
                <select id="funcMemory">
                    <option value="128">128 MB</option>
                    <option value="256">256 MB</option>
                    <option value="512">512 MB</option>
                    <option value="1024">1024 MB</option>
                    <option value="2048">2048 MB</option>
                    <option value="3072">3072 MB</option>
                </select>
            </div>

            <div class="form-group">
                <label>Timeout</label>
                <select id="funcTimeout">
                    <option value="3">3 seconds</option>
                    <option value="30">30 seconds</option>
                    <option value="60">1 minute</option>
                    <option value="300">5 minutes</option>
                    <option value="900">15 minutes</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" id="funcDescription" placeholder="Optional description">
            </div>

            <div class="form-group">
                <label>Function Code (Demo)</label>
                <textarea id="funcCode" rows="6">exports.handler = async (event) => {
  return {
    statusCode: 200,
    body: JSON.stringify({ message: "Hello from Function (Demo)!" })
  };
};</textarea>
            </div>
        </div>

        <div class="modal-footer">
            <button onclick="closeLambdaModal()" class="btn-secondary">Cancel</button>
            <button onclick="addFunction(); refreshFunctions(); closeLambdaModal();" class="btn-primary">Create</button>
        </div>
    </div>
</div>

<script src="lambda.js"></script>
<script>
    // profile name
    const name = localStorage.getItem("loggedInUserName") || "User";
    document.getElementById("profileName").textContent = name;

    function refreshFunctions() {
        loadFunctions();
        updateStats();
    }

    function updateStats() {
        document.getElementById('functionCount').textContent = lambdaFunctions.length;
        document.getElementById('invocationCount').textContent = Math.floor(Math.random() * 100);
    }

    loadFunctions();
    updateStats();
</script>

</body>
</html>
