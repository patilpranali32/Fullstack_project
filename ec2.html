<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Compute (VMs) - Cloud Console UI </title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="ec2.css">
</head>
<body>

<!-- Auth protection -->
<script src="auth.js"></script>
<script>
  requireAuth();
</script>

<div class="topnav">
    <div class="logo">Cloud Console <span class="demo-badge">DEMO</span></div>
    <input type="text" placeholder="Search services...">

    <div class="region-selector">
        <select id="regionSelect">
            <option value="us-east-1">US East (N. Virginia)</option>
            <option value="us-west-2">US West (Oregon)</option>
            <option value="eu-west-1">EU (Ireland)</option>
            <option value="ap-south-1">Asia Pacific (Mumbai)</option>
        </select>
    </div>

    <div class="profile" id="profileName">User</div>
    <div class="profile" onclick="logout()">Logout</div>
</div>



<div class="sidebar">
    <h3>Home</h3>
    <a href="dashboard.html">Dashboard</a>

    <h3>Compute</h3>
    <a href="ec2.html" class="active">Compute (VMs)</a>
    <a href="lambda.html">Functions</a>

    <h3>Storage</h3>
    <a href="s3.html">Object Storage</a>

    <h3>Database</h3>
    <a href="rds.html">Managed DB</a>

    <h3>Management</h3>
    <a href="iam.html">Access Control</a>
    <a href="cloudwatch.html">Monitoring</a>
</div>

<div class="main">
    <h1>Compute (VM) Instances</h1>

    <div class="actions-bar">
        <button onclick="showLaunchModal()" class="btn-primary">Launch VM</button>
        <button onclick="refreshInstances()" class="btn-secondary">Refresh</button>
    </div>

    <div class="stats-cards">
        <div class="stat-card">
            <h4>Running</h4>
            <p class="stat-number" id="runningCount">0</p>
        </div>
        <div class="stat-card">
            <h4>Stopped</h4>
            <p class="stat-number" id="stoppedCount">0</p>
        </div>
        <div class="stat-card">
            <h4>Total</h4>
            <p class="stat-number" id="totalCount">0</p>
        </div>
    </div>

    <table id="ec2Table">
        <thead>
            <tr>
                <th>Instance ID</th>
                <th>Status</th>
                <th>Instance Type</th>
                <th>Image</th>
                <th>Region</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="ec2TableBody"></tbody>
    </table>
</div>

<!-- Launch Instance Modal -->
<div id="launchModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Launch VM </h2>
            <span class="close" onclick="closeLaunchModal()">&times;</span>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label>Instance Type</label>
                <select id="instanceType">
                    <option value="t3.micro">t3.micro (2 vCPU, 1 GiB)</option>
                    <option value="t3.small">t3.small (2 vCPU, 2 GiB)</option>
                    <option value="t3.medium">t3.medium (2 vCPU, 4 GiB)</option>
                    <option value="t3.large">t3.large (2 vCPU, 8 GiB)</option>
                    <option value="m5.large">m5.large (2 vCPU, 8 GiB)</option>
                    <option value="c5.large">c5.large (2 vCPU, 4 GiB)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Machine Image </label>
                <select id="amiSelect">
                    <option value="linux-2">Linux </option>
                    <option value="ubuntu-20.04">Ubuntu 20.04 </option>
                    <option value="windows-2019">Windows Server 2019 </option>
                    <option value="rhel-8">RHEL 8 </option>
                </select>
            </div>

            <div class="form-group">
                <label>Region</label>
                <select id="instanceRegion">
                    <option value="us-east-1">US East (N. Virginia)</option>
                    <option value="us-west-2">US West (Oregon)</option>
                    <option value="eu-west-1">EU (Ireland)</option>
                    <option value="ap-south-1">Asia Pacific (Mumbai)</option>
                </select>
            </div>

            <div class="form-group">
                <label>Key Pair</label>
                <select id="keyPair">
                    <option value="demo-keypair">demo-keypair</option>
                    <option value="new-keypair">Create new key pair </option>
                </select>
            </div>

            <div class="form-group">
                <label>Security Group</label>
                <select id="securityGroup">
                    <option value="default">default</option>
                    <option value="web-sg">web-sg</option>
                    <option value="custom-sg">Create new security group </option>
                </select>
            </div>
        </div>

        <div class="modal-footer">
            <button onclick="closeLaunchModal()" class="btn-secondary">Cancel</button>
            <button onclick="addInstance(); refreshInstances(); closeLaunchModal();" class="btn-primary">Launch</button>
        </div>
    </div>
</div>

<script src="ec2.js"></script>
<script>
    // profile name
    const name = localStorage.getItem("loggedInUserName") || "User";
    document.getElementById("profileName").textContent = name;

    function refreshInstances() {
        loadInstances();
        updateStats();
    }

    function updateStats() {
        const running = ec2Instances.filter(i => i.status === 'Running').length;
        const stopped = ec2Instances.filter(i => i.status === 'Stopped').length;
        document.getElementById('runningCount').textContent = running;
        document.getElementById('stoppedCount').textContent = stopped;
        document.getElementById('totalCount').textContent = ec2Instances.length;
    }

    // Initial load
    loadInstances();
    updateStats();
</script>

</body>
</html>
